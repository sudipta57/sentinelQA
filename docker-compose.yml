services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelqa-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SCREENSHOT_DIR=/app/screenshots
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./screenshots:/app/screenshots
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: sentinelqa-frontend
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  demo-app:
    build:
      context: ./demo-app
    container_name: sentinelqa-demo-app
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./demo-app:/app
      - /app/node_modules

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
